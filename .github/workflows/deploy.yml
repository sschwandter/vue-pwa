name: Deploy to GitHub Pages

on:
  # Deploy on every push to main, and allow manual runs from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; queue (don't cancel) the next one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Production build uses the /vue-pwa/ base (set in vite.config.ts) since
      # the project site is served from /<repo>/.
      #
      # The Supabase values enable optional cloud sync. They're read from repo
      # Variables (Settings → Secrets and variables → Actions → Variables) — not
      # Secrets, since both are public-by-design and ship in the client anyway
      # (RLS protects the data). If the variables are unset, the build is simply
      # local-only with no sync.
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # GitHub Pages has no SPA rewrite rules. Serving index.html for unknown
      # paths lets deep links / refreshes on client routes (e.g. /vue-pwa/faq)
      # boot the app instead of 404ing — vue-router then renders the route.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
